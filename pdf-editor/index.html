<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC Auth Form Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="page">
        <div class="card">
            <div class="card-header">
                <div class="icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                </div>
                <h1>CC Authorization Form</h1>
                <p>Fill in the dealership info. The generated PDF will have the cardholder section left editable for your client.</p>
            </div>

            <form id="form" autocomplete="off">
                <div class="form-group">
                    <label for="f-buyer">Buyer Name <span class="req">*</span></label>
                    <input type="text" id="f-buyer" placeholder="Full name" required>
                </div>
                <div class="form-group">
                    <label for="f-deal">Deal # <span class="opt">(if applicable)</span></label>
                    <input type="text" id="f-deal" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label for="f-stock">Stock # <span class="opt">(if applicable)</span></label>
                    <input type="text" id="f-stock" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label for="f-invoice">Parts/Service Invoice # <span class="opt">(if applicable)</span></label>
                    <input type="text" id="f-invoice" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label for="f-date">Date of Purchase <span class="req">*</span></label>
                    <input type="date" id="f-date" required>
                </div>
                <div class="form-group">
                    <label for="f-amount">Amount Due <span class="req">*</span></label>
                    <div class="input-prefix">
                        <span>$</span>
                        <input type="text" id="f-amount" placeholder="0.00" inputmode="decimal" required>
                    </div>
                </div>

                <button type="submit" id="btn-generate" class="btn-generate">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>Generate &amp; Download PDF</span>
                </button>
            </form>

            <p class="card-footer">Your info is pre-filled and locked. The cardholder section stays editable for the client to complete.</p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
