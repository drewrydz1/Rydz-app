<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="app-version" content="v4.1.0"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Rydz Driver</title>

<script>var fl=document.createElement("link");fl.rel="stylesheet";fl.href="https://fonts.googleapis.com/css2?family=Poppins:wght%40400;500;600;700;800;900&family=Nunito:wght%40400;600;700;800&display=swap";document.head.appendChild(fl);</script>

<link rel="stylesheet" href="driver-style.css">
</head>
<body><div class="app" id="app">
<div class="scr on" id="s-load"><div class="ld-scr"><div style="color:#fff;font-size:32px;font-weight:900;letter-spacing:3px">RYDZ</div><div class="ld-spin"></div></div></div>

<div class="scr" id="s-login"><div style="background:linear-gradient(155deg,var(--nv),var(--nv2));padding:70px 28px 50px;text-align:center;border-radius:0 0 36px 36px;display:flex;align-items:center;justify-content:center;min-height:42vh"><div style="color:#fff;font-size:52px;font-weight:900;letter-spacing:5px">RYDZ</div></div><div style="padding:28px 24px;flex:1"><h2 style="font-size:22px;font-weight:800;margin-bottom:4px">Driver Login</h2><p style="color:var(--g400);font-size:13px;margin-bottom:24px;font-family:var(--font2)">Sign in with credentials from your admin.</p><div class="ff"><label>Username</label><input id="dl-user" placeholder="Enter username"></div><div class="ff"><label>Password</label><input id="dl-pass" type="password" placeholder="Enter password"></div><div class="fe" id="dl-err"></div><button class="btn btn-p btn-lg btn-w" style="margin-top:8px" onclick="doLogin()">Sign In</button></div></div>

<div class="scr" id="s-vehicle"><div style="padding:28px 24px;flex:1"><h2 style="font-size:22px;font-weight:800;margin-bottom:4px">Select your vehicle</h2><p style="color:var(--g400);font-size:13px;margin-bottom:8px;font-family:var(--font2)">Which vehicle are you driving today?</p><div class="veh-grid" id="veh-grid"></div><button class="btn btn-dark btn-lg btn-w" id="veh-btn" disabled onclick="goMain()">Continue</button></div></div>

<div class="scr" id="s-main">
<div class="ov" id="d-ov" onclick="closeSB()"></div>
<div class="sb" id="d-sb"><div class="sb-hd"><div class="sb-av" id="dsb-av">D</div><div><div class="nm" id="dsb-nm">Driver</div><div class="em" id="dsb-em">Vehicle 1</div></div></div><div class="sb-nv">
<button class="sb-it" onclick="closeSB()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>Home</button>
<button class="sb-it" onclick="openDM('dashboard')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
<button class="sb-it" onclick="openDM('create')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="7.5"/><path d="M9 6v6M6 9h6"/></svg>Create Ride</button>
<button class="sb-it" onclick="openDM('profile')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="4"/><path d="M1 18v-1a6 6 0 0116 0v1"/></svg>My Profile</button>
<button class="sb-it" onclick="openDM('history')"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="9" r="7.5"/><path d="M9 5v4l3 1.5"/></svg>Ride History</button>
</div><div class="sb-ft"><button class="btn btn-danger btn-w" onclick="doLogout()" style="padding:12px;font-size:14px">Sign Out</button></div></div>
<div class="hdr"><div class="hdr-top"><button style="background:none;border:none;cursor:pointer;padding:4px;color:rgba(255,255,255,.55)" onclick="openSB()"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div style="color:#fff;font-size:20px;font-weight:900;letter-spacing:2px">RYDZ</div><div style="width:22px"></div></div><div style="display:flex;align-items:center;justify-content:space-between"><div class="profile"><div class="profile-av" id="h-av">D</div><div><h3 id="h-nm">Driver</h3><p id="h-vc">Vehicle 1</p></div></div><button class="tg" id="h-tg" onclick="togOn()"><div class="k"></div></button></div></div>
<div class="cnt" id="cnt"></div>
<div class="mscr" id="ms-create"></div>
<div class="mscr" id="ms-dashboard"></div>
<div class="mscr" id="ms-profile"></div>
<div class="mscr" id="ms-history"></div>
</div>
</div>
<script src="driver-app.js"></script></body></html>
