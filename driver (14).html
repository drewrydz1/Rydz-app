<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--nv:#0a1628;--nv2:#11253f;--bl:#007AFF;--blp:#e8f2ff;--cy:#30d5c8;--rd:#ff453a;--rdl:#ffe5e5;--gn:#34c759;--gnl:#e5f8ec;--or:#ff9f0a;--w:#fff;--g50:#f7f8fa;--g100:#f0f1f4;--g150:#e8eaed;--g200:#dcdee3;--g300:#c4c7cc;--g400:#8e9196;--g500:#636569;--g600:#48494d;--g800:#1d1d1f;--r:14px;--r2:18px;--font:'Poppins',sans-serif;--font2:'Nunito',sans-serif}html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}body{font-family:var(--font);background:var(--g50);color:var(--g800)}.app{max-width:430px;margin:0 auto;height:100%;position:relative;overflow:hidden}.scr{display:none;position:absolute;inset:0;flex-direction:column;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--w)}.scr.on{display:flex;animation:fu .28s ease}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes fi{from{opacity:0}to{opacity:1}}@keyframes sp{to{transform:rotate(360deg)}}@keyframes pl{0%,100%{box-shadow:0 0 0 0 rgba(0,122,255,.2)}50%{box-shadow:0 0 0 10px rgba(0,122,255,0)}}@keyframes pg{0%,100%{box-shadow:0 0 0 0 rgba(52,199,89,.2)}50%{box-shadow:0 0 0 10px rgba(52,199,89,0)}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;font-family:var(--font);font-weight:700;cursor:pointer;transition:all .18s;border-radius:var(--r)}.btn:active{transform:scale(.97)}.btn-p{background:var(--bl);color:var(--w);box-shadow:0 4px 14px rgba(0,122,255,.22)}.btn-p:disabled{opacity:.3;pointer-events:none}.btn-s{background:var(--gn);color:var(--w)}.btn-o{background:var(--w);border:1.5px solid var(--g200);color:var(--g600)}.btn-dark{background:var(--nv);color:var(--w)}.btn-danger{background:var(--rd);color:var(--w)}.btn-ghost{background:none;color:var(--g500);padding:8px}.btn-lg{padding:15px 28px;font-size:16px;border-radius:var(--r2)}.btn-w{width:100%}
.ff{margin-bottom:14px}.ff label{display:block;font-size:11px;font-weight:700;color:var(--g500);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;font-family:var(--font2)}.ff input{width:100%;padding:13px 14px;border:1.5px solid var(--g200);border-radius:var(--r);font-size:15px;font-family:var(--font);color:var(--g800);outline:none;transition:border-color .2s;background:var(--w)}.ff input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(0,122,255,.08)}.fe{color:var(--rd);font-size:12px;font-weight:600;margin-top:4px;display:none}.fe.show{display:block}
.hdr{background:linear-gradient(155deg,var(--nv),#152d4a);padding:18px 20px 22px;border-radius:0 0 22px 22px}.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:800;letter-spacing:.5px;background:rgba(48,213,200,.12);color:var(--cy)}.tag::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.profile{display:flex;align-items:center;gap:14px}.profile-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--cy));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;flex-shrink:0}.profile h3{color:#fff;font-size:16px;font-weight:800}.profile p{color:rgba(255,255,255,.4);font-size:12px;margin-top:2px;font-family:var(--font2)}
.cnt{padding:16px;animation:fu .3s ease}.card{background:var(--w);border-radius:var(--r2);padding:18px;box-shadow:0 1px 6px rgba(0,0,0,.04);margin-bottom:10px}.card.req{border:2px solid var(--bl);animation:pl 2s infinite}.card.act{border:2px solid var(--gn);animation:pg 2s infinite}
.tg-row{display:flex;justify-content:space-between;align-items:center}.tg-row h4{font-size:15px;font-weight:800}.tg-row p{font-size:12px;color:var(--g400);margin-top:2px;font-family:var(--font2)}.tg{width:56px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}.tg.off{background:var(--g300)}.tg.on{background:var(--gn)}.tg .k{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.12)}.tg.off .k{left:3px}.tg.on .k{left:29px}
.route{display:flex;gap:14px;margin:10px 0}.route-dots{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0}.route-dots .r-top,.route-dots .r-bot{width:28px;height:28px;border-radius:50%;background:var(--nv);display:flex;align-items:center;justify-content:center}.route-dots .r-line{width:3px;flex:1;min-height:20px;background:var(--nv)}.route-i{flex:1}.route-i p{font-size:13px;font-weight:600;color:var(--g800)}.route-dv{border-top:1px solid var(--g150);margin:6px 0;padding-top:6px}.route-lbl{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.5px;font-family:var(--font2)}
.stats{display:flex;gap:6px;margin:10px 0}.stat{background:var(--g50);border:1px solid var(--g150);border-radius:10px;padding:8px 12px;flex:1;text-align:center}.stat .l{font-size:9px;color:var(--g400);font-weight:600;text-transform:uppercase;font-family:var(--font2);letter-spacing:.3px}.stat .v{font-weight:600;font-size:13px;margin-top:2px;color:var(--g500)}
.note{background:var(--g50);border:1px solid var(--g150);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--g600);margin-bottom:10px}.btn-row{display:flex;gap:10px;margin-top:10px}.btn-row .btn{flex:1;padding:14px 20px;font-size:15px;font-weight:700;border-radius:14px}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700}.bdg::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}.bb{background:rgba(0,122,255,.1);color:var(--bl)}.bg3{background:var(--g100);color:var(--g400)}.bg2{background:rgba(52,199,89,.1);color:var(--gn)}
.ride-map{height:140px;border-radius:var(--r);overflow:hidden;margin-bottom:10px;border:1px solid var(--g150)}.ride-map svg{width:100%;height:100%;display:block}.empty{text-align:center;padding:40px 20px}.empty h4{font-size:16px;font-weight:800;margin-bottom:5px}.empty p{font-size:13px;color:var(--g400);font-family:var(--font2)}.svc-alert{display:flex;align-items:center;gap:8px;padding:11px 14px;border-radius:var(--r);background:var(--rdl);color:var(--rd);font-size:12px;font-weight:600;margin-top:4px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900}.ov.on{display:block;animation:fi .2s ease}.sb{position:fixed;top:0;left:0;bottom:0;width:280px;max-width:80vw;background:var(--w);z-index:910;transform:translateX(-100%);transition:transform .28s cubic-bezier(.22,.68,.36,1);display:flex;flex-direction:column}.sb.on{transform:translateX(0)}.sb-hd{padding:24px 20px;background:var(--nv);display:flex;align-items:center;gap:14px}.sb-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--cy));display:flex;align-items:center;justify-content:center;color:var(--w);font-weight:800;font-size:18px;flex-shrink:0}.sb-hd .nm{color:var(--w);font-weight:700;font-size:15px}.sb-hd .em{color:rgba(255,255,255,.4);font-size:12px;font-family:var(--font2)}.sb-nv{flex:1;padding:12px 0}.sb-it{display:flex;align-items:center;gap:14px;padding:13px 20px;cursor:pointer;font-size:14px;font-weight:600;color:var(--g600);border:none;background:none;width:100%;font-family:var(--font);text-align:left;transition:background .15s}.sb-it:hover{background:var(--g50)}.sb-it svg{color:var(--g400)}.sb-ft{padding:16px 20px;border-top:1px solid var(--g150)}
.fw{position:relative;margin-bottom:10px;z-index:60}.fw:focus-within{z-index:70}.acl{position:absolute;left:0;right:0;top:100%;background:var(--w);border-radius:0 0 var(--r) var(--r);box-shadow:0 8px 32px rgba(0,0,0,.14);z-index:200;max-height:220px;overflow-y:auto;border:1px solid var(--g200);display:none}.acl.show{display:block}.aci{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g100)}.aci:hover{background:var(--blp)}.aci .aic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.aci .aic.food{background:#fff3e0;color:var(--or)}.aci .aic.place{background:var(--blp);color:var(--bl)}.aci .aic.addr{background:var(--g100);color:var(--g500)}.aci .mn{font-weight:600;font-size:13px}.aci .sb2{font-size:10px;color:var(--g400);font-family:var(--font2)}.ac-cat{padding:5px 14px;font-size:9px;font-weight:700;color:var(--g400);text-transform:uppercase;background:var(--g50);border-bottom:1px solid var(--g100)}
.mscr{display:none;position:absolute;inset:0;flex-direction:column;background:var(--w);z-index:100;overflow-y:auto}.mscr.on{display:flex;animation:fu .25s ease}.mtop{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--g150)}.mtop h2{font-size:18px;font-weight:800}
.veh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}.veh-opt{padding:16px;border:2px solid var(--g200);border-radius:var(--r2);text-align:center;cursor:pointer;transition:all .18s;background:var(--w)}.veh-opt:hover{border-color:var(--bl)}.veh-opt.sel{border-color:var(--bl);background:var(--blp)}.veh-opt .vn{font-size:14px;font-weight:700;margin-top:6px}.veh-opt .vd{font-size:11px;color:var(--g400);margin-top:2px;font-family:var(--font2)}
.ld-scr{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--nv);gap:12px}.ld-spin{width:26px;height:26px;border:2.5px solid rgba(255,255,255,.1);border-top-color:var(--bl);border-radius:50%;animation:sp .7s linear infinite}.hidden{display:none!important}
</style>

var _watchId=null;
var _lastGPS=0;
function startGPS(){
if(!navigator.geolocation){if(typeof showToast==='function')showToast('Location services not available.');return}
if(_watchId!==null)return;
navigator.geolocation.getCurrentPosition(
function(firstPos){
var lat=firstPos.coords.latitude;
var lng=firstPos.coords.longitude;
var d=gD();if(d){d.lat=lat;d.lng=lng;sv()}
supaFetch('PATCH','users','?id=eq.'+encodeURIComponent(DID),{lat:lat,lng:lng});
_watchId=navigator.geolocation.watchPosition(function(pos){
var now=Date.now();
if(now-_lastGPS<5000)return;
_lastGPS=now;
var la=pos.coords.latitude;
var ln=pos.coords.longitude;
var dd=gD();if(dd){dd.lat=la;dd.lng=ln;sv()}
supaFetch('PATCH','users','?id=eq.'+encodeURIComponent(DID),{lat:la,lng:ln});
},function(err){console.log('Watch error:',err.message)},{enableHighAccuracy:true,maximumAge:5000,timeout:10000});
},
function(err){
if(err.code===1){
if(typeof showToast==='function')showToast('Location permission denied. Please enable Location Services in your phone Settings for this site.');
}else{
if(typeof showToast==='function')showToast('Could not get your location. Please try again.');
}
},
{enableHighAccuracy:true,timeout:10000}
);
}
function stopGPS(){
if(_watchId!==null){navigator.geolocation.clearWatch(_watchId);_watchId=null}
var d=gD();
if(d){d.lat=null;d.lng=null}
supaFetch('PATCH','users','?id=eq.'+encodeURIComponent(DID),{lat:null,lng:null});
}
