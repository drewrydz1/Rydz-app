<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rydz — Naples, FL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a1628;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:32px;font-weight:800;text-align:center;margin-bottom:8px}
p{color:rgba(255,255,255,.5);font-size:14px;text-align:center;margin-bottom:40px;max-width:340px;line-height:1.6}
.cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:600px}
.card{background:linear-gradient(155deg,#11253f,#163254);border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:28px 24px;text-align:center;width:170px;cursor:pointer;transition:all .2s;text-decoration:none;color:#fff}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,122,255,.15)}
.card h3{font-size:15px;font-weight:700;margin:12px 0 4px}
.card span{font-size:12px;color:rgba(255,255,255,.4)}
.foot{margin-top:48px;font-size:11px;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<h1>RYDZ</h1>
<p>Eco-friendly, all-electric rides in Naples, FL. Choose your portal below.</p>
<div class="cards">
<a href="rider.html" class="card">
<svg width="36" height="36" fill="none" stroke="#007AFF" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
<h3>Rider App</h3>
<span>Book a ride</span>
</a>
<a href="driver.html" class="card">
<svg width="36" height="36" fill="none" stroke="#30d5c8" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="8" width="22" height="8" rx="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><path d="M3 8l2-4h14l2 4"/></svg>
<h3>Driver App</h3>
<span>Accept rides</span>
</a>
<a href="admin.html" class="card">
<svg width="36" height="36" fill="none" stroke="#ff9f0a" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
<h3>Admin</h3>
<span>Dashboard</span>
</a>
</div>
<p class="foot">Rydz Testing Environment — Naples, FL</p>
</body>
</html>
